name: PR Validation

on:
  pull_request:
    branches:
      - main

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      code-changed: ${{ steps.changes.outputs.code }}
      docs-only: ${{ steps.changes.outputs.docs-only }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Check for code changes
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            code:
              - 'resume-builder-ui/**'
              - 'app.py'
              - 'resume_generator*.py'
              - 'templates/**'
              - 'tests/**'
              - 'requirements.txt'
              - 'package*.json'
              - 'Dockerfile*'
              - '.github/workflows/**'
              - 'pyproject.toml'
            docs-only:
              - '*.md'
              - 'docs/**'
              - 'LICENSE'
              - '.gitignore'

  test:
    name: Run Tests
    needs: changes
    if: needs.changes.outputs.code-changed == 'true'
    uses: ./.github/workflows/test.yml

  docker-build:
    name: Build Docker (Verify)
    runs-on: ubuntu-latest
    needs: [changes, test]
    if: needs.changes.outputs.code-changed == 'true' && !failure()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image (verification only)
        run: |
          docker build -t resume-builder:pr-${{ github.event.number }} .
          echo "✅ Docker build successful - image not pushed on PR"

      - name: Smoke test the built image
        run: |
          docker run -d --name smoke-test -p 5000:5000 resume-builder:pr-${{ github.event.number }}
          for i in $(seq 1 15); do
            if curl -f -s http://localhost:5000/health > /dev/null; then
              echo "✅ Container started and /health responded"
              exit 0
            fi
            echo "Waiting for container to become healthy... ($i/15)"
            sleep 2
          done
          echo "❌ Container did not become healthy in time"
          docker logs smoke-test
          exit 1

      - name: Dump container logs on failure
        if: failure()
        run: docker logs smoke-test || true

      - name: Stop smoke test container
        if: always()
        run: docker rm -f smoke-test || true

  docs-only-check:
    name: Documentation Only
    runs-on: ubuntu-latest
    needs: changes
    if: needs.changes.outputs.code-changed == 'false'
    
    steps:
      - name: Documentation change detected
        run: |
          echo "📚 Only documentation files changed - skipping tests and build"
          echo "✅ PR validation complete for docs-only changes"