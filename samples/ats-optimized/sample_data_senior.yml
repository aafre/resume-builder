          - "Led development of internal capacity planning tool (Project Forecast) that reduced over-provisioning costs by $50M annually and was adopted by 12 AWS service teams"
          - "Authored 3 company-wide technical standards for service-to-service communication, error handling, and observability, adopted across 200+ teams and 1,400+ microservices"
