    content: "Engineering leader with 16 years of experience spanning individual contribution, team leadership, and executive management. Built and scaled engineering organizations from 5 to 120+ engineers across 3 continents. Delivered platforms handling $30B+ in annual transaction volume with 99.99% uptime. Expertise in distributed systems, cloud architecture, and organizational transformation. Track record of reducing infrastructure costs by 40%+ while improving system reliability and developer productivity."

