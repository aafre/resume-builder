          - "Architected migration from monolithic payment service to event-driven microservices architecture, reducing deployment cycle from 2 weeks to 2 hours and enabling 15 independent team deployments per day"
          - "Established SRE practices and on-call culture achieving 99.99% uptime across all payment-critical services, up from 99.9%, preventing an estimated $12M in annual revenue loss"
          - "Drove adoption of Kubernetes across 200+ services, consolidating 8 separate deployment pipelines into a unified platform and reducing infrastructure costs by $4.2M annually"
          - "Built engineering career ladder and promotion framework adopted company-wide, improving senior engineer retention by 25% and reducing time-to-productivity for new hires from 6 weeks to 2 weeks"
          - "Led technical due diligence for 2 acquisition targets, evaluating architecture, technical debt, and team capabilities for deals totalling $180M"

      - company: "Uber"
        title: "Senior Engineering Manager"
        dates: "Mar 2018 – Dec 2020"
